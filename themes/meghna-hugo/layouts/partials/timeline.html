{{ $data := index site.Data site.Language.Lang }}

{{ if $data.timeline.timeline.enable }}
{{ with $data.timeline.timeline }}
<section id="timeline" class="section timeline-section">
  <div class="container">
    <div class="title text-center wow fadeIn" data-wow-duration="500ms">
      <h2>{{ .title }}</h2>
      <div class="border-meghna"></div>
    </div>
    <div class="timeline-grid">
      {{ range .milestones }}
      <article class="timeline-item wow fadeInUp" data-wow-duration="500ms">
        <p class="timeline-date">{{ .date }}</p>
        <h3>{{ .title }}</h3>
        <p>{{ .output }}</p>
      </article>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
{{ end }}
