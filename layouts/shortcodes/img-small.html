<div class="post-image-wrapper" style="width: 100%; margin: 30px 0; text-align: center;">
  <img 
    src="{{ .Get 0 }}" 
    alt="{{ .Get 1 }}" 
    class="img-fluid" 
    style="width: 100%; height: auto; border-radius: 5px; display: block;"
  >
  {{ with .Get 1 }}
    <small style="display: block; margin-top: 10px; font-style: italic; color: #888;">{{ . }}</small>
  {{ end }}
</div>
