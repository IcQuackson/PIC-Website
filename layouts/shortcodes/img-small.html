{{- $src := .Get 0 -}}
{{- $res := .Page.Resources.GetMatch $src -}}
{{- $url := cond (eq $res nil) ($src | relURL) "" -}}
{{- with $res }}{{ $url = .RelPermalink }}{{ end -}}
{{- $maxWidth := .Get 2 -}}
<div class="post-image-wrapper" style="width: 100%; margin: 30px 0; text-align: center;">
  <img
    src="{{ $url }}"
    alt="{{ .Get 1 }}"
    class="img-fluid"
    style="width: 100%;{{ with $maxWidth }} max-width: {{ . }};{{ end }} height: auto; border-radius: 5px; display: block;{{ with $maxWidth }} margin-left: auto; margin-right: auto;{{ end }}"
  >
  {{ with .Get 1 }}
    <small style="display: block; margin-top: 10px; font-style: italic; color: #888;">{{ . }}</small>
  {{ end }}
</div>
