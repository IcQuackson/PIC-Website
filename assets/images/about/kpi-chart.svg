<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Operational KPI chart</title>
  <desc id="desc">Stylized dashboard with detection and reconvergence performance metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2033" />
      <stop offset="100%" stop-color="#0b1625" />
    </linearGradient>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)" />
  <rect x="100" y="90" width="1000" height="570" rx="20" fill="#162c44" stroke="#2d4a67"/>
  <g stroke="#2c4b69" stroke-width="1">
    <line x1="170" y1="560" x2="1030" y2="560"/>
    <line x1="170" y1="470" x2="1030" y2="470"/>
    <line x1="170" y1="380" x2="1030" y2="380"/>
    <line x1="170" y1="290" x2="1030" y2="290"/>
    <line x1="170" y1="200" x2="1030" y2="200"/>
  </g>
  <polyline points="180,520 320,440 460,310 600,360 740,270 880,230 1010,210" fill="none" stroke="#67dfe6" stroke-width="8"/>
  <polyline points="180,550 320,500 460,430 600,390 740,340 880,300 1010,260" fill="none" stroke="#ff9f6d" stroke-width="8"/>
  <g fill="#e6f4ff" font-family="Space Grotesk, sans-serif">
    <text x="150" y="150" font-size="36">Operational KPI Snapshot</text>
    <text x="150" y="620" font-size="22" fill="#9fc4e3">Trials</text>
    <text x="930" y="620" font-size="22" fill="#9fc4e3">T12</text>
  </g>
  <g fill="#a9dff2" font-family="IBM Plex Sans, sans-serif" font-size="20">
    <text x="170" y="680">Cyan: PTT recovery trend</text>
    <text x="430" y="680">Orange: setup time trend</text>
  </g>
</svg>
