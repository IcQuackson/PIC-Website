############################### Service ###################################
service:
  enable : true
  title : "Operational Workflow"
  service_item:
    - name : "0. Pre-Plan"
      icon : "ti-layout-grid2-thumb"
      content : "Estimate initial UAV hover point and relay count."

    - name : "1. Bring Up"
      icon : "ti-control-play"
      content : "Start command services and deploy ground nodes."

    - name : "2. Detect"
      icon : "ti-target"
